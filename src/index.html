<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'; worker-src 'self' blob:;"
    />
    <title>Notepad Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&family=Poppins:wght@400;700&family=Roboto:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script type="importmap">
      {
        "imports": {
          "dompurify": "./js/vendor/dompurify.js"
        }
      }
    </script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="title-bar" class="title-bar" role="banner">
      <div class="title-left title-bar-drag">
        <div class="app-brand" aria-label="Notepad Pro">
          <div class="app-logo" aria-hidden="true">NP</div>
          <div>
            <div class="app-name">Notepad Pro</div>
            <div id="save-state-label" class="app-subtitle">Ready</div>
          </div>
        </div>
        <div id="tabs-container" class="tabs-container" role="tablist" aria-label="Open documents"></div>
        <button id="new-tab-btn" class="icon-btn title-action" type="button" data-action="new" aria-label="New file" title="New file">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" /></svg>
        </button>
      </div>

      <div class="title-right">
        <button id="toggle-sidebar-top" class="icon-btn title-action" type="button" data-action="toggle-sidebar" aria-label="Toggle sidebar" title="Toggle sidebar">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16M4 12h16M4 19h16" /></svg>
        </button>
        <div class="window-controls" aria-label="Window controls">
          <button id="minimize-btn" type="button" data-action="minimize" aria-label="Minimize" title="Minimize">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 12h12" /></svg>
          </button>
          <button id="maximize-btn" type="button" data-action="maximize" aria-label="Maximize" title="Maximize">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7h10v10H7z" /></svg>
          </button>
          <button id="close-btn" class="close-window" type="button" data-action="close-app" aria-label="Close" title="Close">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7l10 10M17 7 7 17" /></svg>
          </button>
        </div>
      </div>
    </div>

    <nav id="menu-bar" class="menu-bar" aria-label="Application menu">
      <div class="menu-item" role="menuitem" tabindex="0" aria-haspopup="true" aria-expanded="false">
        <button type="button" class="menu-label">File</button>
        <div class="dropdown" role="menu" aria-label="File">
          <button type="button" role="menuitem" data-action="new">New</button>
          <button type="button" role="menuitem" data-action="open">Open</button>
          <button type="button" role="menuitem" data-action="save">Save</button>
          <button type="button" role="menuitem" data-action="save-as">Save As</button>
          <span class="menu-separator" aria-hidden="true"></span>
          <button type="button" role="menuitem" data-action="exit">Exit</button>
        </div>
      </div>

      <div class="menu-item" role="menuitem" tabindex="0" aria-haspopup="true" aria-expanded="false">
        <button type="button" class="menu-label">Edit</button>
        <div class="dropdown" role="menu" aria-label="Edit">
          <button type="button" role="menuitem" data-action="undo">Undo</button>
          <button type="button" role="menuitem" data-action="redo">Redo</button>
          <span class="menu-separator" aria-hidden="true"></span>
          <button type="button" role="menuitem" data-action="cut">Cut</button>
          <button type="button" role="menuitem" data-action="copy">Copy</button>
          <button type="button" role="menuitem" data-action="paste">Paste</button>
          <span class="menu-separator" aria-hidden="true"></span>
          <button type="button" role="menuitem" data-action="clear-editor">Reset Editor</button>
          <button type="button" role="menuitem" data-action="find">Find</button>
        </div>
      </div>

      <div class="menu-item" role="menuitem" tabindex="0" aria-haspopup="true" aria-expanded="false">
        <button type="button" class="menu-label">View</button>
        <div class="dropdown" role="menu" aria-label="View">
          <button type="button" role="menuitem" data-action="zoom-in">Zoom In</button>
          <button type="button" role="menuitem" data-action="zoom-out">Zoom Out</button>
          <button type="button" role="menuitem" data-action="reset-zoom">Reset Zoom</button>
          <span class="menu-separator" aria-hidden="true"></span>
          <button type="button" role="menuitem" data-action="toggle-sidebar">Toggle Sidebar</button>
        </div>
      </div>

      <div class="menu-item" role="menuitem" tabindex="0" aria-haspopup="true" aria-expanded="false">
        <button type="button" class="menu-label">Help</button>
        <div class="dropdown" role="menu" aria-label="Help">
          <button type="button" role="menuitem" data-action="about">About Notepad Pro</button>
        </div>
      </div>
    </nav>

    <div id="toolbar" class="toolbar" aria-label="Editor toolbar">
      <div class="toolbar-group">
        <button type="button" class="toolbar-btn" data-action="save" aria-label="Save" title="Save Ctrl+S">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h12l2 2v12H5zM8 5v6h8V5M8 19v-5h8v5" /></svg>
        </button>
        <button type="button" class="toolbar-btn" data-action="open" aria-label="Open" title="Open Ctrl+O">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7h7l2 2h9v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /></svg>
        </button>
        <button type="button" class="toolbar-btn" data-action="new" aria-label="New file" title="New Ctrl+N">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8zM14 3v5h5M12 12v6M9 15h6" /></svg>
        </button>
      </div>

      <div class="toolbar-group">
        <button type="button" class="toolbar-btn" data-action="undo" aria-label="Undo" title="Undo Ctrl+Z">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 9H5V5M5 9a8 8 0 1 1 2.34 5.66" /></svg>
        </button>
        <button type="button" class="toolbar-btn" data-action="redo" aria-label="Redo" title="Redo Ctrl+Y">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 9h4V5M19 9a8 8 0 1 0-2.34 5.66" /></svg>
        </button>
        <button type="button" class="toolbar-btn" data-action="select-all" aria-label="Select all" title="Select all Ctrl+A">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h6M14 4h6M4 20h6M14 20h6M4 4v6M20 4v6M4 14v6M20 14v6" /></svg>
        </button>
      </div>

      <div class="toolbar-group">
        <select id="font-family-select" class="toolbar-select" aria-label="Font family">
          <option value="Arial">Arial</option>
          <option value="Times New Roman">Times New Roman</option>
          <option value="Helvetica">Helvetica</option>
          <option value="Verdana">Verdana</option>
          <option value="Roboto" selected>Roboto</option>
          <option value="Poppins">Poppins</option>
          <option value="Montserrat">Montserrat</option>
          <option value="Courier New">Courier New</option>
          <option value="Georgia">Georgia</option>
          <option value="Open Sans">Open Sans</option>
        </select>

        <select id="font-size-select" class="toolbar-select" aria-label="Font size">
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
          <option value="11">11</option>
          <option value="12">12</option>
          <option value="14">14</option>
          <option value="16">16</option>
          <option value="18">18</option>
          <option value="20">20</option>
          <option value="22">22</option>
          <option value="24">24</option>
        </select>
      </div>

      <div class="toolbar-group">
        <button id="btn-bold" type="button" class="toolbar-btn text-tool" data-action="bold" aria-label="Bold" title="Bold (Ctrl+B)">
          <span aria-hidden="true">B</span>
        </button>
        <button id="btn-italic" type="button" class="toolbar-btn text-tool italic-tool" data-action="italic" aria-label="Italic" title="Italic (Ctrl+I)">
          <span aria-hidden="true">I</span>
        </button>
        <button id="btn-underline" type="button" class="toolbar-btn text-tool underline-tool" data-action="underline" aria-label="Underline" title="Underline (Ctrl+U)">
          <span aria-hidden="true">U</span>
        </button>
        <button id="btn-strikethrough" type="button" class="toolbar-btn text-tool strikethrough-tool" data-action="strikethrough" aria-label="Strikethrough" title="Strikethrough">
          <span aria-hidden="true"><s>S</s></span>
        </button>
      </div>

      <div class="toolbar-group">
        <label class="sr-only" for="font-color-picker">Font Color</label>
        <input id="font-color-picker" type="color" class="toolbar-color-picker" title="Font Color" value="#ffffff" />
        <label class="sr-only" for="highlight-color-picker">Highlight Color</label>
        <input id="highlight-color-picker" type="color" class="toolbar-color-picker highlight-picker" title="Highlight Color" value="#000000" />
        <button id="btn-clear-format" type="button" class="toolbar-btn" data-action="clear-format" aria-label="Clear formatting" title="Clear Formatting">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.5 19 11 12.5 4.5 19m13-14L11 11.5 4.5 5M11 12.5V21M11 3v8.5" /></svg>
        </button>
      </div>

      <div class="toolbar-group">
        <button id="btn-align-left" type="button" class="toolbar-btn" data-action="justifyLeft" aria-label="Align left" title="Align Left">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M3 12h12M3 18h18" /></svg>
        </button>
        <button id="btn-align-center" type="button" class="toolbar-btn" data-action="justifyCenter" aria-label="Align center" title="Align Center">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M6 12h12M3 18h18" /></svg>
        </button>
        <button id="btn-align-right" type="button" class="toolbar-btn" data-action="justifyRight" aria-label="Align right" title="Align Right">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M9 12h12M3 18h18" /></svg>
        </button>
      </div>

      <div class="toolbar-group">
        <button type="button" class="toolbar-btn" data-action="find" aria-label="Find" title="Find Ctrl+F">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" /></svg>
        </button>
        <button type="button" class="toolbar-btn" data-action="zoom-out" aria-label="Zoom out" title="Zoom out">
          <svg viewBox="0 0 24 24" aria-hidden="true" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <button type="button" class="toolbar-btn" data-action="zoom-in" aria-label="Zoom in" title="Zoom in">
          <svg viewBox="0 0 24 24" aria-hidden="true" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
      </div>

      <div class="toolbar-spacer"></div>

      <button id="theme-toggle" type="button" class="toolbar-btn" data-action="toggle-theme" aria-label="Toggle theme" title="Toggle Theme">
        <svg id="theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M6.3 17.7l-1.4 1.4M19.1 6.3l-1.4 1.4"/></svg>
        <svg id="theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true" style="display: none;"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
      <div id="active-file-label" class="file-pill" aria-live="polite">Untitled</div>
    </div>

    <div id="find-bar" class="find-bar" hidden>
      <div class="find-row">
        <label class="sr-only" for="find-input">Find text</label>
        <input id="find-input" type="search" autocomplete="off" spellcheck="false" placeholder="Find" />
        <button id="find-prev-btn" type="button" class="icon-btn" data-action="find-prev" aria-label="Previous match" title="Previous match">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m18 15-6-6-6 6" /></svg>
        </button>
        <button id="find-next-btn" type="button" class="icon-btn" data-action="find-next" aria-label="Next match" title="Next match">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
        </button>
        <label class="check-label">
          <input id="match-case-checkbox" type="checkbox" />
          <span>Match case</span>
        </label>
        <span id="find-count" class="find-count" aria-live="polite">0 matches</span>
        <button id="find-close-btn" type="button" class="icon-btn" data-action="find-close" aria-label="Close find" title="Close find">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" /></svg>
        </button>
      </div>

      <div class="replace-controls">
        <label class="sr-only" for="replace-input">Replace with</label>
        <input id="replace-input" type="text" autocomplete="off" spellcheck="false" placeholder="Replace with" />
        <button id="replace-btn" type="button" class="action-btn" data-action="replace" aria-label="Replace" title="Replace">Replace</button>
        <button id="replace-all-btn" type="button" class="action-btn" data-action="replace-all" aria-label="Replace all" title="Replace all">Replace All</button>
      </div>
    </div>

    <main id="workspace" class="workspace">
      <aside id="sidebar" class="sidebar" aria-label="Sidebar">
        <section class="sidebar-panel">
          <div class="panel-header">
            <h2>Recent Files</h2>
            <div class="panel-actions">
              <button class="icon-btn" type="button" data-action="clear-history" aria-label="Clear history" title="Clear history">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></svg>
              </button>
              <button id="collapse-sidebar-btn" class="icon-btn" type="button" data-action="toggle-sidebar" aria-label="Collapse sidebar" title="Collapse sidebar">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" /></svg>
              </button>
            </div>
          </div>
          <ul id="recent-files-list" class="recent-list" aria-label="Recent files"></ul>
        </section>
        <!-- <section class="sidebar-panel">
          <h2>Recovery</h2>
          <p class="sidebar-hint">Unsaved work is snapshotted locally while you type.</p>
        </section> -->
      </aside>

      <div id="sidebar-resizer" class="sidebar-resizer" role="separator" aria-orientation="vertical" aria-label="Resize sidebar"></div>

      <section class="editor-pane" aria-label="Editor area">
        <div class="editor-frame">
          <div id="editor" class="rich-editor" contenteditable="true" role="textbox" aria-label="Document editor" aria-multiline="true" spellcheck="true"></div>
        </div>
      </section>
    </main>

    <footer id="status-bar" class="status-bar" aria-label="Document status">
      <span id="cursor-position">Ln 1, Col 1</span>
      <span id="word-count">0 words</span>
      <span id="char-count">0 chars</span>
      <button id="toggle-mode-btn" class="status-btn" title="Toggle Plain/Rich Text">
        <i class="ph ph-text-aa"></i>
      </button>
      <span id="file-type">Plain Text</span>
      <span id="save-status">Saved</span>
      <span id="zoom-level">100%</span>
    </footer>

    <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="true"></div>

    <div id="modal-backdrop" class="modal-backdrop" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-message">
        <h2 id="modal-title">Confirm</h2>
        <p id="modal-message"></p>
        <div id="modal-extra" class="modal-extra"></div>
        <div class="modal-actions">
          <button id="modal-cancel-btn" type="button" class="secondary-btn">Cancel</button>
          <button id="modal-secondary-btn" type="button" class="secondary-btn">Don't Save</button>
          <button id="modal-primary-btn" type="button" class="primary-btn">Save</button>
        </div>
      </section>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
